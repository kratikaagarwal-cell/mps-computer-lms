{% extends "base.html" %}
{% block content %}
<div class="container mt-5 text-center">
  <div class="card p-5 shadow">
    <h2>🎉 Quiz Submitted!</h2>
    <h4 class="mt-3">{{ quiz.title }}</h4>
    <div class="display-4 mt-4 fw-bold {% if score == total %}text-success{% elif score >= total//2 %}text-warning{% else %}text-danger{% endif %}">
      {{ score }} / {{ total }}
    </div>
    <p class="mt-2 text-muted">
      {% if score == total %}Perfect Score! 🌟
      {% elif score >= total//2 %}Good Job! Keep it up 👍
      {% else %}Keep Practicing! 💪{% endif %}
    </p>
    <a href="/student" class="btn btn-primary mt-3">Back to Portal</a>
  </div>
</div>
{% endblock %}
