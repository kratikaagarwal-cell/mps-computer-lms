{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <h3>📝 Create New Quiz</h3>
  <form method="POST" action="/create_quiz">
    <div class="card p-3 mb-3">
      <div class="row g-2">
        <div class="col-md-4">
          <label>Quiz Title</label>
          <input type="text" name="title" class="form-control" required>
        </div>
        <div class="col-md-3">
          <label>Chapter</label>
          <select name="chapter" class="form-control" required>
            {% for ch in chapters %}
            <option value="{{ ch.name }}">Ch {{ ch.no }} - {{ ch.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-2">
          <label>Chapter No</label>
          <select name="chapter_no" class="form-control">
            {% for ch in chapters %}
            <option value="{{ ch.no }}">{{ ch.no }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <label>Section</label>
          <select name="section" class="form-control">
            <option value="All Sections">All Sections</option>
            {% for s in sections %}
            <option value="{{ s }}">{{ s }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12">
          <label>Description (optional)</label>
          <input type="text" name="description" class="form-control">
        </div>
      </div>
    </div>

    <div id="questions-container">
      <div class="card p-3 mb-3 question-block">
        <h6>Question 1</h6>
        <input type="text" name="question_text" class="form-control mb-2" placeholder="Question text" required>
        <div class="row g-2">
          <div class="col-md-6"><input type="text" name="option_a" class="form-control" placeholder="Option A" required></div>
          <div class="col-md-6"><input type="text" name="option_b" class="form-control" placeholder="Option B" required></div>
          <div class="col-md-6"><input type="text" name="option_c" class="form-control" placeholder="Option C" required></div>
          <div class="col-md-6"><input type="text" name="option_d" class="form-control" placeholder="Option D" required></div>
        </div>
        <div class="mt-2">
          <label>Correct Answer:</label>
          <select name="correct_option" class="form-control w-auto d-inline-block">
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
          </select>
        </div>
      </div>
    </div>

    <button type="button" class="btn btn-secondary mb-3" onclick="addQuestion()">+ Add Question</button>
    <br>
    <button type="submit" class="btn btn-success">✅ Save Quiz</button>
    <a href="/teacher" class="btn btn-outline-secondary ms-2">Cancel</a>
  </form>
</div>

<script>
let count = 1;
function addQuestion() {
  count++;
  const container = document.getElementById('questions-container');
  const block = document.createElement('div');
  block.className = 'card p-3 mb-3 question-block';
  block.innerHTML = `
    <h6>Question ${count}</h6>
    <input type="text" name="question_text" class="form-control mb-2" placeholder="Question text" required>
    <div class="row g-2">
      <div class="col-md-6"><input type="text" name="option_a" class="form-control" placeholder="Option A" required></div>
      <div class="col-md-6"><input type="text" name="option_b" class="form-control" placeholder="Option B" required></div>
      <div class="col-md-6"><input type="text" name="option_c" class="form-control" placeholder="Option C" required></div>
      <div class="col-md-6"><input type="text" name="option_d" class="form-control" placeholder="Option D" required></div>
    </div>
    <div class="mt-2">
      <label>Correct Answer:</label>
      <select name="correct_option" class="form-control w-auto d-inline-block">
        <option value="A">A</option><option value="B">B</option>
        <option value="C">C</option><option value="D">D</option>
      </select>
    </div>
    <button type="button" class="btn btn-sm btn-danger mt-2" onclick="this.closest('.question-block').remove()">Remove</button>
  `;
  container.appendChild(block);
}
</script>
{% endblock %}
