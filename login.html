<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login — MPS LMS</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #0f4c81, #1abc9c); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.box { background: white; width: 420px; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.25); }
.top { background: linear-gradient(135deg, #0f4c81, #1565c0); padding: 40px 30px; text-align: center; color: white; }
.top .icon { font-size: 60px; display: block; margin-bottom: 12px; }
.top h2 { font-size: 24px; font-weight: 700; }
.top p { font-size: 13px; opacity: 0.85; margin-top: 5px; }
.body { padding: 30px; }
.alert { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; padding: 12px 16px; border-radius: 10px; margin-bottom: 18px; font-size: 14px; }
label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 5px; }
input { width: 100%; padding: 12px 14px; border: 1.5px solid #dde3ec; border-radius: 10px; margin-bottom: 14px; font-size: 14px; background: #fafbfc; }
input:focus { outline: none; border-color: #0f4c81; }
.btn { width: 100%; background: linear-gradient(135deg, #0f4c81, #1abc9c); color: white; border: none; padding: 14px; border-radius: 25px; font-size: 15px; font-weight: 700; cursor: pointer; }
.btn:hover { opacity: 0.9; }
.back { text-align: center; margin-top: 16px; font-size: 13px; color: #888; }
.back a { color: #0f4c81; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<div class="box">
  <div class="top">
    <span class="icon">👨‍💼</span>
    <h2>Admin Login</h2>
    <p>MPS Computer LMS — Administration</p>
  </div>
  <div class="body">
    {% if error %}<div class="alert">❌ {{ error }}</div>{% endif %}
    <form method="POST">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter admin username" required autofocus>
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter password" required>
      <button class="btn" type="submit">🔓 Login as Admin</button>
    </form>
    <div class="back"><a href="/">← Back to Home</a></div>
  </div>
</div>
</body>
</html>
